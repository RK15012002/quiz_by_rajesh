<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F3ECDA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QuizMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#F3ECDA;
    --paper-light:#FBF8EF;
    --graphite:#2B2B2E;
    --graphite-soft:#6B6759;
    --pencil:#E8B923;
    --pen-blue:#2C5F8A;
    --pen-red:#C0392B;
    --pen-green:#3F7D4F;
    --line:#D8CBA8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--graphite);}
  body{
    font-family:'Public Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit;}
  .app-shell{max-width:540px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
  .content{flex:1;padding:24px 20px 12px;}

  .stamp{
    display:inline-block;border:3px solid var(--pen-blue);color:var(--pen-blue);
    padding:6px 16px;transform:rotate(-2deg);font-family:'Space Mono',monospace;
    font-weight:700;text-transform:uppercase;letter-spacing:2px;border-radius:4px;
    font-size:clamp(20px,6vw,28px);
  }
  .subtitle{color:var(--graphite-soft);margin-top:18px;font-size:15px;line-height:1.5;}
  .eyebrow{
    font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--graphite-soft);margin-bottom:4px;
  }

  .home-hero{padding-top:12vh;text-align:center;}
  .home-buttons{margin-top:48px;display:flex;flex-direction:column;gap:14px;}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:16px 20px;border-radius:10px;border:none;font-size:16px;font-weight:600;
    cursor:pointer;min-height:52px;transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--pen-blue);color:#fff;}
  .btn-success{background:var(--pen-green);color:#fff;}
  .btn-outline{background:transparent;color:var(--graphite);border:1.5px solid var(--graphite);}
  .btn-text{background:transparent;color:var(--pen-blue);font-weight:600;padding:10px;}
  .btn-danger{background:transparent;color:var(--pen-red);border:1.5px solid var(--pen-red);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}

  .card{
    background:var(--paper-light);border:1px solid var(--line);border-radius:12px;
    padding:18px;margin-bottom:14px;
  }
  .perforated::before{
    content:"";display:block;height:10px;margin:-18px -18px 14px;
    background-image:radial-gradient(circle, var(--paper) 3.2px, transparent 3.6px);
    background-size:16px 16px;background-position:2px -3px;background-repeat:repeat-x;
    border-bottom:1px dashed var(--line);
  }

  .field-label{font-size:13px;font-weight:600;color:var(--graphite-soft);margin-bottom:6px;display:block;}
  input[type=text], textarea{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:8px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--graphite);
  }
  input[type=text]:focus, textarea:focus{outline:2px solid var(--pen-blue);outline-offset:1px;border-color:var(--pen-blue);}
  textarea{resize:vertical;min-height:70px;}

  /* progress */
  .progress-track{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin:14px 0 6px;}
  .progress-fill{height:100%;background:var(--pencil);transition:width .25s ease;}
  .progress-label{font-family:'Space Mono',monospace;font-size:12px;color:var(--graphite-soft);}

  .question-text{font-size:clamp(18px,5vw,22px);font-weight:700;line-height:1.35;margin:16px 0 22px;}

  /* scantron-style options */
  .option{
    display:flex;align-items:center;gap:14px;padding:14px;border:1.5px solid var(--line);
    border-radius:10px;margin-bottom:10px;background:var(--paper-light);cursor:pointer;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .option:active{transform:scale(0.995);}
  .option.selected{border-color:var(--pen-blue);box-shadow:0 0 0 1.5px var(--pen-blue) inset;}
  .option.locked{cursor:default;}
  .option.correct{background:#CFE8D4;border-color:var(--pen-green);box-shadow:0 0 0 1.5px var(--pen-green) inset;}
  .option.incorrect{background:#F3D3CD;border-color:var(--pen-red);box-shadow:0 0 0 1.5px var(--pen-red) inset;}
  .bubble{
    width:32px;height:32px;min-width:32px;border-radius:50%;border:2.5px solid var(--graphite);
    display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;
    font-weight:700;font-size:14px;transition:background .15s ease, border-color .15s ease;
  }
  .option.selected .bubble{background:var(--pencil);border-color:var(--graphite);}
  .option.correct .bubble{background:#fff;border-color:var(--pen-green);}
  .option.incorrect .bubble{background:#fff;border-color:var(--pen-red);}
  .option-text{font-size:15.5px;}

  .feedback-msg{margin-top:16px;padding:12px 14px;border-radius:8px;font-weight:700;font-size:14.5px;}
  .feedback-correct{background:#E7F1E9;color:var(--pen-green);}
  .feedback-wrong{background:#F7E8E6;color:var(--pen-red);}
  .feedback-locked{background:var(--line);color:var(--graphite-soft);}

  .toggle-row{display:flex;align-items:center;gap:10px;margin-top:26px;font-size:13.5px;color:var(--graphite-soft);}
  .toggle-row input[type=checkbox]{width:19px;height:19px;accent-color:var(--pen-blue);flex-shrink:0;}
  .toggle-row.mt-tight{margin-top:14px;}

  .timer-input-row{display:flex;align-items:center;gap:10px;margin-top:12px;margin-left:29px;}
  .timer-input-row .field-label{margin-bottom:0;white-space:nowrap;}
  .timer-input-row input[type=text]{width:64px;padding:8px 10px;text-align:center;}

  .advanced-settings{margin-top:22px;}
  .advanced-toggle{
    background:none;border:none;padding:0;color:var(--graphite-soft);font-size:13px;font-weight:600;
    cursor:pointer;font-family:inherit;
  }
  .advanced-panel{display:none;margin-top:12px;padding:14px;border:1px dashed var(--line);border-radius:10px;}
  .advanced-panel.open{display:block;}
  .advanced-panel input[type=text]{width:120px;}

  /* per-question timer badge */
  .meta-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .timer-display{
    font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--graphite-soft);
    background:var(--paper-light);border:1.5px solid var(--line);border-radius:20px;padding:4px 12px;
    white-space:nowrap;
  }
  .timer-display.timer-warning{color:var(--pen-red);border-color:var(--pen-red);background:#F7E8E6;}

  /* bottom nav */
  .bottom-nav{
    position:sticky;bottom:0;background:var(--paper);padding:14px 20px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;
  }

  /* modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(43,43,46,.55);display:flex;align-items:flex-end;
    justify-content:center;z-index:50;
  }
  .modal{
    background:var(--paper-light);width:100%;max-width:540px;border-radius:16px 16px 0 0;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  }
  .modal h3{margin:0 0 16px;font-family:'Space Mono',monospace;font-size:16px;text-transform:uppercase;letter-spacing:1px;}
  .type-toggle{display:flex;gap:8px;margin:10px 0 16px;}
  .type-pill{
    flex:1;padding:10px;text-align:center;border:1.5px solid var(--line);border-radius:8px;
    font-size:13.5px;font-weight:600;cursor:pointer;color:var(--graphite-soft);
  }
  .type-pill.active{border-color:var(--pen-blue);color:var(--pen-blue);background:#EAF1F6;}
  .option-input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .option-input-row span{font-family:'Space Mono',monospace;font-size:13px;width:18px;color:var(--graphite-soft);}
  .hint{font-size:12px;color:var(--graphite-soft);margin-top:4px;line-height:1.4;}

  /* builder list */
  .q-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:var(--paper-light);
  }
  .q-row-text{font-size:14.5px;flex:1;}
  .q-row-remove{color:var(--pen-red);background:none;border:none;font-size:13px;font-weight:600;cursor:pointer;padding:4px;}

  /* results */
  .score-badge{
    font-family:'Space Mono',monospace;font-size:clamp(28px,9vw,40px);font-weight:700;
    text-align:center;margin:6px 0 4px;
  }
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
  .pill-correct{background:#E7F1E9;color:var(--pen-green);}
  .pill-wrong{background:#F7E8E6;color:var(--pen-red);}
  .pill-skipped{background:var(--line);color:var(--graphite-soft);}
  .marks-label{float:right;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--graphite-soft);}
  .review-answer{font-size:14px;margin-top:8px;color:var(--graphite-soft);}
  .review-answer b{color:var(--graphite);}
  .score-breakdown{text-align:center;font-size:13px;color:var(--graphite-soft);margin-top:4px;}

  .help-text{white-space:pre-wrap;font-family:'Space Mono',monospace;font-size:12.5px;line-height:1.6;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px;}

  #file-input{display:none;}
  .center-text{text-align:center;}
  .mt-6{margin-top:6px;}
  .mt-24{margin-top:24px;}

  /* dark mode */
  [data-theme="dark"]{
    --paper:#1B1B1D;--paper-light:#242427;--graphite:#F0EDE4;--graphite-soft:#A6A296;
    --pen-blue:#5B9BD5;--pen-red:#E07A6C;--pen-green:#6FBF7F;--line:#3A3A3D;
  }
  [data-theme="dark"] input[type=text],[data-theme="dark"] textarea{background:#2A2A2D;color:var(--graphite);}
  [data-theme="dark"] .modal-overlay{background:rgba(0,0,0,.65);}
  [data-theme="dark"] .option.correct{background:#274430;}
  [data-theme="dark"] .option.incorrect{background:#4A2C27;}
  [data-theme="dark"] .option.correct .bubble,[data-theme="dark"] .option.incorrect .bubble{background:#1B1B1D;}

  /* flag / bookmark button */
  .flag-btn{
    background:none;border:1.5px solid var(--line);border-radius:20px;padding:6px 12px;
    font-size:12.5px;font-weight:600;color:var(--graphite-soft);cursor:pointer;font-family:inherit;
  }
  .flag-btn.active{border-color:var(--pencil);color:#8A6A0E;background:#FBF1D6;}

  /* question navigator */
  .navigator-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0 16px;}
  .nav-cell{
    aspect-ratio:1;border-radius:8px;border:1.5px solid var(--line);background:var(--paper-light);
    font-family:'Space Mono',monospace;font-weight:700;font-size:13px;cursor:pointer;color:var(--graphite);
  }
  .nav-cell.answered{border-color:var(--pen-green);background:#E7F1E9;color:var(--pen-green);}
  .nav-cell.flagged{box-shadow:0 0 0 2px var(--pencil) inset;}
  .nav-cell.current{border-color:var(--pen-blue);box-shadow:0 0 0 2px var(--pen-blue) inset;}
  .nav-cell:disabled{opacity:.4;cursor:not-allowed;}
  .nav-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--graphite-soft);margin-bottom:6px;}
  .nav-legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle;}
  .dot-answered{background:var(--pen-green);}
  .dot-unanswered{background:var(--line);}
  .dot-flagged{background:var(--pencil);}
  .dot-current{background:var(--pen-blue);}

  /* result filter tabs */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;}
  .tab-pill{
    padding:8px 12px;border:1.5px solid var(--line);border-radius:20px;font-size:12.5px;font-weight:600;
    cursor:pointer;color:var(--graphite-soft);
  }
  .tab-pill.active{border-color:var(--pen-blue);color:var(--pen-blue);background:#EAF1F6;}

  .pill-pass{background:#E7F1E9;color:var(--pen-green);}
  .pill-fail{background:#F7E8E6;color:var(--pen-red);}

  .explanation-box{
    margin-top:10px;padding:10px 12px;border-left:3px solid var(--pen-blue);background:var(--paper);
    font-size:13.5px;color:var(--graphite-soft);border-radius:4px;line-height:1.5;
  }

  /* attempt history */
  .history-row{
    display:flex;align-items:center;gap:10px;padding:14px;border:1px solid var(--line);border-radius:10px;
    margin-bottom:10px;background:var(--paper-light);cursor:pointer;
  }

  @media print{
    .no-print,.bottom-nav,#file-input{display:none !important;}
    body,.app-shell{background:#fff;}
    .card{break-inside:avoid;}
  }

  /* gear icon / settings */
  .top-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:6px;}
  .gear-btn{
    background:var(--paper-light);border:1.5px solid var(--line);border-radius:50%;
    width:42px;height:42px;font-size:19px;cursor:pointer;color:var(--graphite);
    display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;
  }
  .gear-btn:active{transform:scale(0.95);}
  .lang-toggle{display:flex;gap:8px;margin:10px 0 20px;}
</style>
</head>

function t(key, params){
  const dict = I18N[state.language] || I18N.en;
  let str = dict[key] !== undefined ? dict[key] : (I18N.en[key] !== undefined ? I18N.en[key] : key);
  if (params){
    Object.keys(params).forEach(k => {
      str = str.split('{{' + k + '}}').join(params[k]);
    });
  }
  return str;
}
let rerender = null;

const SETTINGS_KEY = 'quizmaster_settings_v1';
const HISTORY_KEY = 'quizmaster_history_v1';
const ATTENDEE_KEY = 'quizmaster_attendee_v1';

function saveAttendee(){
  try{ localStorage.setItem(ATTENDEE_KEY, JSON.stringify(state.attendee)); } catch(e){ /* ignore */ }
}
function loadAttendee(){
  try{
    const raw = localStorage.getItem(ATTENDEE_KEY);
    if (raw) Object.assign(state.attendee, JSON.parse(raw));
  } catch(e){ /* ignore */ }
}
function validMobile(m){ return /^[0-9]{10}$/.test((m||'').trim()); }
function validEmail(m){ return !m || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(m.trim()); }

function saveSettings(){
  try{
    const s = {
      instantFeedback: state.instantFeedback,
      timerEnabled: state.timerEnabled,
      timePerQuestion: state.timePerQuestion,
      overallTimerEnabled: state.overallTimerEnabled,
      overallTimeMinutes: state.overallTimeMinutes,
      negativeMarking: state.negativeMarking,
      negativeMarkingInput: state.negativeMarkingInput,
      passingPercent: state.passingPercent,
      shuffleQuestions: state.shuffleQuestions,
      shuffleOptions: state.shuffleOptions,
      showNavigator: state.showNavigator,
      lockPrevious: state.lockPrevious,
      darkMode: state.darkMode,
      soundEnabled: state.soundEnabled,
      language: state.language,
    };
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  } catch(e){ /* storage unavailable — ignore */ }
}
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    Object.assign(state, JSON.parse(raw));
  } catch(e){ /* ignore corrupt/blocked storage */ }
}
function applyTheme(){
  if (state.darkMode) document.documentElement.setAttribute('data-theme','dark');
  else document.documentElement.removeAttribute('data-theme');
}
function playSound(kind){
  if (!state.soundEnabled) return;
  try{
    const ctx = playSound._ctx || (playSound._ctx = new (window.AudioContext||window.webkitAudioContext)());
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const freqs = { correct:880, wrong:220, timeup:440 };
    o.frequency.value = freqs[kind] || 440;
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.start(); o.stop(ctx.currentTime + 0.25);
  } catch(e){ /* audio not available — ignore */ }
}

/* ---------------- Attendee registration + gated quiz launch ---------------- */
let pendingLaunch = null; // holds the startQuiz-triggering function while registration/access modal is open

function renderRegistrationModal(onDone, opts){
  opts = opts || {};
  const a = state.attendee;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.setAttribute('data-overlay','registration');
  overlay.innerHTML = `
    <div class="modal">
      <h3>${t('registration_title')}</h3>
      <p class="hint mt-6" style="margin-bottom:16px;">${t('registration_hint')}</p>
      <label class="field-label">${t('registration_name')}</label>
      <input type="text" id="reg-name" value="${escapeAttr(a.name||'')}" placeholder="${escapeAttr(t('registration_name_placeholder'))}">
      <label class="field-label mt-24">${t('registration_mobile')}</label>
      <input type="text" id="reg-mobile" inputmode="numeric" maxlength="10" value="${escapeAttr(a.mobile||'')}" placeholder="${escapeAttr(t('registration_mobile_placeholder'))}">
      <label class="field-label mt-24">${t('registration_email')}</label>
      <input type="text" id="reg-email" value="${escapeAttr(a.email||'')}" placeholder="${escapeAttr(t('registration_email_placeholder'))}">
      <p id="reg-error" class="hint" style="color:var(--pen-red);display:none;margin-top:10px;"></p>
      <button class="btn btn-primary mt-24" style="width:100%;" data-action="submit-registration">${t('registration_continue')}</button>
    </div>
  `;
  document.body.appendChild(overlay);
  pendingLaunch = onDone;
}

function handleRegistrationSubmit(){
  const name = document.getElementById('reg-name').value.trim();
  const mobile = document.getElementById('reg-mobile').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const errEl = document.getElementById('reg-error');
  if (!name || !validMobile(mobile) || !validEmail(email)){
    errEl.textContent = t('registration_error');
    errEl.style.display = 'block';
    return;
  }
  state.attendee = { name, mobile, email };
  saveAttendee();
  closeModal();
  const launch = pendingLaunch;
  pendingLaunch = null;
  if (launch) proceedToAccessCheck(launch);
}

/* Optional server-side (Apps Script) access check by mobile number.
   Only runs if APPS_SCRIPT_URL is configured; otherwise access is open. */
function proceedToAccessCheck(launch){
  if (!APPS_SCRIPT_URL){ launch(); return; }
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'checkAccess', mobile: state.attendee.mobile, quizTitle: state.title || (dailyQuiz && dailyQuiz.title) || '' })
  })
    .then(res => res.json())
    .then(data => {
      if (data && data.allowed){ launch(); }
      else { alert(t('access_denied') + (data && data.reason ? '\n' + data.reason : '')); }
    })
    .catch(() => { launch(); /* backend unreachable — fail open so a network hiccup doesn't lock out attendees */ });
}

/** Wrap any quiz-start action: ensures attendee is registered (once), then starts the quiz. */
function requireRegistrationThen(launch){
  if (state.attendee.name && validMobile(state.attendee.mobile)){
    proceedToAccessCheck(launch);
  } else {
    renderRegistrationModal(launch);
  }
}

/** Fire-and-forget: sends a completed attempt's score to the Apps Script backend, if configured. */
function submitResultToBackend(attempt){
  if (!APPS_SCRIPT_URL) return;
  const correct = Object.keys(attempt.answers||{}).filter(k => attempt.answers[k] === (attempt.questions[k]||{}).answer).length;
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'submitResult',
      name: state.attendee.name,
      mobile: state.attendee.mobile,
      email: state.attendee.email,
      quizTitle: attempt.title,
      totalQuestions: attempt.questions.length,
      correctCount: correct,
      date: attempt.date,
    })
  }).catch(() => { /* best-effort — local history already has the result */ });
}


function getHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e){ return []; }
}
function setHistory(list){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }
  catch(e){ try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0,50))); } catch(e2){ /* ignore */ } }
}
function saveAttemptToHistory(attempt){
  const list = getHistory();
  list.unshift(attempt);
  if (list.length > 200) list.length = 200;
  setHistory(list);
}
function deleteAttempt(id){ setHistory(getHistory().filter(a => a.id !== id)); }
function clearAllHistory(){ setHistory([]); }

function computeSummary(attempt){
  const total = attempt.questions.length;
  let rawScore = 0, correctCount = 0, incorrectCount = 0, skippedCount = 0;
  attempt.questions.forEach((q, i) => {
    const given = (attempt.answers[i] || '');
    const attempted = !!given.trim();
    const correct = attempted && given.trim().toLowerCase() === q.answer.trim().toLowerCase();
    if (!attempted) skippedCount++;
    else if (correct){ correctCount++; rawScore += 1; }
    else { incorrectCount++; rawScore -= attempt.negativeMarking; }
  });
  const pct = total ? Math.round((rawScore/total)*100) : 0;
  const passed = pct >= (attempt.passingPercent ?? 40);
  return { total, rawScore, correctCount, incorrectCount, skippedCount, pct, passed };
}
function buildAttemptFromState(){
  const totalTime = state.startedAt ? Math.round((Date.now() - state.startedAt) / 1000) : 0;
  return {
    id: state.currentAttemptId || ('a_' + Date.now()),

    totalTime,
  };
}

/* ---------------- CSV parsing ---------------- */
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ','){ row.push(field); field=''; }
      else if (c === '\n' || c === '\r'){
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field=''; rows.push(row); row=[];
      } else field += c;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length === 1 && r[0].trim() === ''));
}

/* Recognizes English and Hindi column headers, e.g. "प्रश्न" for "question" */
const HEADER_ALIASES = {
  question: ['question','ques','प्रश्न'],
  answer: ['answer','ans','उत्तर'],
  explanation: ['explanation','explain','व्याख्या'],
  option1: ['option1','opt1','विकल्प1'],
  option2: ['option2','opt2','विकल्प2'],
  option3: ['option3','opt3','विकल्प3'],
  option4: ['option4','opt4','विकल्प4'],
};
function findHeaderIndex(headers, key){
  const aliases = HEADER_ALIASES[key] || [key];
  for (const alias of aliases){
    const idx = headers.indexOf(alias);
    if (idx >= 0) return idx;
  }
  return -1;
}
function rowsToQuestions(rows){
  if (!rows || !rows.length) return [];
  const headers = rows[0].map(h => String(h == null ? '' : h).trim().toLowerCase());
  const qIdx = findHeaderIndex(headers, 'question');
  const aIdx = findHeaderIndex(headers, 'answer');
  const explIdx = findHeaderIndex(headers, 'explanation');
  const optIdx = [1,2,3,4].map(n => findHeaderIndex(headers, 'option'+n));
  const out = [];
  for (let r = 1; r < rows.length; r++){
    const row = rows[r] || [];
    const q = String(row[qIdx] == null ? '' : row[qIdx]).trim();
    if (!q) continue;
    const options = optIdx.map(idx => idx >= 0 ? String(row[idx] == null ? '' : row[idx]).trim() : '').filter(Boolean);
    const answer = String(row[aIdx] == null ? '' : row[aIdx]).trim();
    const explanation = explIdx >= 0 ? String(row[explIdx] == null ? '' : row[explIdx]).trim() : '';
    out.push({ question: q, options, answer, explanation });
  }
  return out;
}
function csvToQuestions(text){ return rowsToQuestions(parseCSV(text)); }

/* ---------------- File loading (JSON, CSV, and Excel .xlsx/.xls) ---------------- */
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  const isExcel = name.endsWith('.xlsx') || name.endsWith('.xls');
  const reader = new FileReader();
  reader.onload = () => {
    try {
      let qs, title;
      if (isExcel){
        if (typeof XLSX === 'undefined') throw new Error('Excel support could not load. Check your internet connection and try again, or use a CSV/JSON file instead.');
        const workbook = XLSX.read(new Uint8Array(reader.result), { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: '' });
        qs = rowsToQuestions(rows);
        title = file.name.replace(/\.(xlsx|xls)$/i, '');
      } else if (name.endsWith('.json')){
        const data = JSON.parse(reader.result);
        qs = data.questions; title = data.title || file.name;
      } else {
        qs = csvToQuestions(reader.result); title = file.name;
      }
      if (!qs || !qs.length){ alert(t('no_questions_in_file')); return; }
      state.title = title;
      state.sourceQuestions = qs;
      requireRegistrationThen(startQuiz);
    } catch (err){
      alert(t('error_reading_file', { msg: err.message }));
    }
    fileInput.value = '';
  };
  if (isExcel) reader.readAsArrayBuffer(file);
  else reader.readAsText(file);
});

/* ---------------- Bilingual question resolution ----------------
   A question can be single-language (question/options/answer/explanation)
   or bilingual using suffixed fields:
   question_en/question_hi, options_en/options_hi, answer_en/answer_hi, explanation_en/explanation_hi
   options_en[i] and options_hi[i] must be the same choice, just translated. */
function localizeQuestion(q, lang){
  const pick = (key) => {
    const suf = lang === 'hi' ? '_hi' : '_en';
    const otherSuf = lang === 'hi' ? '_en' : '_hi';
    if (q[key + suf] !== undefined) return q[key + suf];
    if (q[key + otherSuf] !== undefined) return q[key + otherSuf];
    return q[key];
  };
  return {
    question: pick('question') || '',
    options: (pick('options') || []).slice(),
    answer: pick('answer') || '',
    explanation: pick('explanation') || ''
  };
}

/* Same as localizeQuestion, but reorders options using a fixed permutation of
   original indices, so switching language mid-quiz never reshuffles options
   or changes question order — only the displayed text changes. */
function localizeQuestionOrdered(q, lang, optionOrder){
  const base = localizeQuestion(q, lang);
  if (optionOrder && optionOrder.length && base.options.length){
    base.options = optionOrder.map(i => base.options[i]);
  }
  return base;
}

function startQuiz(){
  readSettingsFromDOM();
  clearQuestionTimer();
  clearOverallTimer();
  state.index = 0;
  state.answers = {};
  state.checked = {};
  state.timedOut = {};
  state.questionStart = {};
  state.questionTime = {};
  state.flagged = {};
  state.startedAt = Date.now();
  state.currentAttemptId = 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);

  // Build a fixed per-quiz meta: which source question in which order, and a
  // fixed option permutation per question. This stays constant regardless of
  // language, so switching EN/हिं mid-quiz never reshuffles anything.
  let srcQuestions = (state.sourceQuestions || []).slice();
  if (state.shuffleQuestions){
    for (let i = srcQuestions.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [srcQuestions[i], srcQuestions[j]] = [srcQuestions[j], srcQuestions[i]];
    }
  }
  state.questionMeta = srcQuestions.map(q => {
    const optCount = (q.options_en || q.options_hi || q.options || []).length;
    let order = Array.from({length: optCount}, (_, i) => i);
    if (state.shuffleOptions && optCount){
      for (let i = order.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i+1));
        [order[i], order[j]] = [order[j], order[i]];
      }
    }
    return { src: q, optionOrder: order };
  });
  state.questions = state.questionMeta.map(m => localizeQuestionOrdered(m.src, state.language, m.optionOrder));

  if (state.overallTimerEnabled) state.overallTimeLeft = state.overallTimeMinutes * 60;
  renderQuestion();
  if (state.overallTimerEnabled) startOverallTimer();
}

/** Finalizes the time spent on the given question (first-visit duration only). */
function finalizeQuestionTime(i){
  if (state.questionTime[i] !== undefined) return;
  const start = state.questionStart[i];
  state.questionTime[i] = start ? Math.max(0, Math.round((Date.now() - start) / 1000)) : 0;
}

function renderQuestion(){
  clearQuestionTimer();
  const total = state.questions.length;
  const q = state.questions[state.index];
  const pct = Math.round(((state.index+1)/total)*100);
  const savedAnswer = state.answers[state.index];
  const isChecked = !!state.checked[state.index];
  const isTimedOut = !!state.timedOut[state.index];
  const locked = isChecked || isTimedOut;
  const showTimer = state.timerEnabled && !locked;
  if (showTimer) state.timeLeft = state.timePerQuestion;
  if (!locked && state.questionStart[state.index] === undefined){
    state.questionStart[state.index] = Date.now();
  }

  let answerBlock;
  let feedbackBlock = '';

  if (q.options && q.options.length){
    answerBlock = q.options.map(opt => {
      let cls = '';
      let actionAttr = 'data-action="select-option"';
      if (locked){
        actionAttr = '';
        if (isChecked){
          if (opt === q.answer) cls = 'correct';
          else if (opt === savedAnswer) cls = 'incorrect';
        } else if (savedAnswer === opt){
          cls = 'selected';
        }
        cls += ' locked';
      } else if (savedAnswer === opt){
        cls = 'selected';
      }
      return `
        <div class="option ${cls}" ${actionAttr} data-value="${escapeAttr(opt)}">
          <div class="bubble">${escapeHtml(opt.charAt(0))}</div>
          <div class="option-text">${escapeHtml(opt)}</div>
        </div>
      `;
    }).join('');
    if (isChecked){
      const correct = savedAnswer === q.answer;
      feedbackBlock = `<div class="feedback-msg ${correct ? 'feedback-correct' : 'feedback-wrong'}">${correct ? t('correct_feedback') : t('incorrect_feedback', {answer: escapeHtml(q.answer)})}</div>`;
    } else if (isTimedOut){
      feedbackBlock = `<div class="feedback-msg feedback-locked">${t('time_up')}</div>`;
    }
  } else {
    answerBlock = `<input type="text" id="text-answer" ${locked ? 'disabled' : ''} placeholder="${escapeAttr(t('text_answer_placeholder'))}" value="${escapeAttr(savedAnswer || '')}">`;
    if (isChecked){
      const correct = (savedAnswer || '').trim().toLowerCase() === q.answer.trim().toLowerCase();
      feedbackBlock = `<div class="feedback-msg ${correct ? 'feedback-correct' : 'feedback-wrong'}">${correct ? t('correct_feedback') : t('incorrect_feedback', {answer: escapeHtml(q.answer)})}</div>`;
    } else if (isTimedOut){
      feedbackBlock = `<div class="feedback-msg feedback-locked">${t('time_up')}</div>`;
    }
  }

  const isLast = state.index === total - 1;
  const showCheckStep = state.instantFeedback && !isChecked && !isTimedOut;

  const navButton = showCheckStep
    ? `<button class="btn btn-primary" data-action="check-answer" style="flex:1;">${t('check_answer')}</button>`
    : `<button class="btn ${isLast ? 'btn-success' : 'btn-primary'}" data-action="next-question" style="flex:1;">${isLast ? t('submit_quiz') : t('next')}</button>`;

  const showEarlySubmit = !(isLast && !showCheckStep);

  app.innerHTML = `
    <div class="content">
      ${gearButtonHTML()}
      <div class="eyebrow">${escapeHtml(state.title)}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div class="meta-row">
        <div class="progress-label">${t('question_of', {n: state.index+1, total: total})}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${showTimer ? `<div class="timer-display" id="timer-display">${formatTime(state.timeLeft)}</div>` : ''}
          ${state.overallTimerEnabled ? `<div class="timer-display" id="overall-timer-display">${t('total_label')}: ${formatTime(state.overallTimeLeft)}</div>` : ''}
        </div>
      </div>
      <div class="meta-row mt-tight">
        <button type="button" class="flag-btn ${state.flagged[state.index] ? 'active' : ''}" data-action="toggle-flag">${state.flagged[state.index] ? t('flagged') : t('flag')}</button>
        ${state.showNavigator ? `<button type="button" class="btn-text" style="padding:6px 4px;" data-action="open-navigator">${t('question_map')}</button>` : ''}
      </div>
      <div class="question-text">${escapeHtml(q.question)}</div>
      <div id="answer-area">${answerBlock}</div>
      ${feedbackBlock}
    </div>
    <div class="bottom-nav">
      <div class="btn-row">
        ${(state.index > 0 && !state.lockPrevious) ? `<button class="btn btn-outline" data-action="prev-question">${t('previous')}</button>` : ''}
        ${navButton}
      </div>
      ${showEarlySubmit ? `<button class="btn btn-danger" data-action="submit-quiz">${t('submit_quiz_now')}</button>` : ''}
    </div>
  `;
  rerender = renderQuestion;

  if (showTimer) startQuestionTimer();
}

function captureAnswer(){
  const q = state.questions[state.index];
  if (q.options && q.options.length){
    const selected = app.querySelector('.option.selected');
    state.answers[state.index] = selected ? selected.getAttribute('data-value') : (state.answers[state.index] || '');
  } else {
    const input = document.getElementById('text-answer');
    state.answers[state.index] = input ? input.value.trim() : '';
  }
}

function countUnanswered(){
  let count = 0;
  for (let i = 0; i < state.questions.length; i++){
    const a = state.answers[i];
    if (!a || !a.trim()) count++;
  }
  return count;
}

/* ---------------- Per-question timer ---------------- */
function clearQuestionTimer(){
  if (state.timerId){
    clearInterval(state.timerId);
    state.timerId = null;
  }
}
function formatTime(s){
  const secs = Math.max(s, 0);
  const m = Math.floor(secs/60);
  const sec = secs % 60;
  return m > 0 ? `${m}:${sec.toString().padStart(2,'0')}` : `${sec}s`;
}
function updateTimerDisplay(){
  const el = document.getElementById('timer-display');
  if (!el) return;
  el.textContent = formatTime(state.timeLeft);
  el.classList.toggle('timer-warning', state.timeLeft <= 10);
}
function startQuestionTimer(){
  updateTimerDisplay();
  state.timerId = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0){
      clearQuestionTimer();
      handleTimeUp();
    }
  }, 1000);
}
function handleTimeUp(){
  captureAnswer();
  state.timedOut[state.index] = true;
  finalizeQuestionTime(state.index);
  playSound('timeup');
  if (state.index === state.questions.length - 1){
    renderResults();
  } else {
    state.index++;
    renderQuestion();
  }
}

/* ---------------- Overall quiz timer ---------------- */
function clearOverallTimer(){
  if (state.overallTimerId){ clearInterval(state.overallTimerId); state.overallTimerId = null; }
}
function updateOverallTimerDisplay(){
  const el = document.getElementById('overall-timer-display');
  if (!el) return;
  el.textContent = 'Total: ' + formatTime(state.overallTimeLeft);
  el.classList.toggle('timer-warning', state.overallTimeLeft <= 30);
}
function startOverallTimer(){
  updateOverallTimerDisplay();
  state.overallTimerId = setInterval(() => {
    state.overallTimeLeft--;
    updateOverallTimerDisplay();
    if (state.overallTimeLeft <= 0){
      clearOverallTimer();
      handleOverallTimeUp();
    }
  }, 1000);
}
function handleOverallTimeUp(){
  if (!state.checked[state.index] && !state.timedOut[state.index]) captureAnswer();
  finalizeQuestionTime(state.index);
  playSound('timeup');
  renderResults();
}

/* ---------------- Question map / flags ---------------- */
function renderNavigatorModal(){
  const cells = state.questions.map((q, i) => {

/* Parses "1/4", "0.25", "1", "0" etc into a number. Returns NaN if invalid. */
function parseFraction(str){
  if (!str) return NaN;
  str = str.trim();
  if (!str) return NaN;
  if (str.includes('/')){
    const parts = str.split('/');
    if (parts.length !== 2) return NaN;
    const n = parseFloat(parts[0].trim());
    const d = parseFloat(parts[1].trim());
    if (!Number.isFinite(n) || !Number.isFinite(d) || d === 0) return NaN;
    return n / d;
  }
  const v = parseFloat(str);
  return Number.isFinite(v) ? v : NaN;
}
/* Rounds to 2 decimals and trims trailing zeros for a clean score display. */
function formatScore(n){
  const rounded = Math.round((n + Number.EPSILON) * 100) / 100;
  let s = rounded.toFixed(2);
  s = s.replace(/\.?0+$/, '');
  if (s === '' || s === '-' || s === '-0') s = '0';
  return s;
}

function renderResults(){
  clearQuestionTimer();
  clearOverallTimer();
  const attempt = buildAttemptFromState();
  saveAttemptToHistory(attempt);
  submitResultToBackend(attempt);
  renderResultView(attempt, 'all', { fromHistory:false });
}

function renderResultView(attempt, filter, opts){
  opts = opts || {};
  clearQuestionTimer();
  clearOverallTimer();
  const summary = computeSummary(attempt);
  const { total, rawScore, correctCount, incorrectCount, skippedCount, pct, passed } = summary;
  const negMarkLabel = attempt.negativeMarking > 0 ? t('negmark_per_wrong', { x: attempt.negativeMarkingInput || formatScore(attempt.negativeMarking) }) : t('negmark_off');
  const times = Object.values(attempt.questionTime || {});
  const avgTime = times.length ? Math.round(times.reduce((a,b) => a+b, 0) / times.length) : 0;
  const flaggedCount = Object.keys(attempt.flagged || {}).filter(k => attempt.flagged[k]).length;

  const tabs = [
    { key:'all', label:t('tab_all'), count: total },
    { key:'correct', label:t('tab_correct'), count: correctCount },
    { key:'incorrect', label:t('tab_incorrect'), count: incorrectCount },
    { key:'skipped', label:t('tab_skipped'), count: skippedCount },
    { key:'flagged', label:t('tab_flagged'), count: flaggedCount },
  ];
  const tabsHtml = tabs.map(t => `<div class="tab-pill ${filter===t.key ? 'active' : ''}" data-action="filter-results" data-filter="${t.key}">${t.label} (${t.count})</div>`).join('');

  const rows = attempt.questions.map((q, i) => {
    const given = attempt.answers[i] || '';
    const attempted = !!given.trim();
    const correct = attempted && given.trim().toLowerCase() === q.answer.trim().toLowerCase();
    const isFlagged = !!(attempt.flagged && attempt.flagged[i]);
    const status = !attempted ? 'skipped' : (correct ? 'correct' : 'incorrect');

    if (filter === 'flagged' && !isFlagged) return '';
    if (filter !== 'all' && filter !== 'flagged' && filter !== status) return '';

    const pillClass = status === 'correct' ? 'pill-correct' : status === 'incorrect' ? 'pill-wrong' : 'pill-skipped';
    const pillLabel = status === 'correct' ? t('pill_correct') : status === 'incorrect' ? t('pill_incorrect') : t('pill_not_attempted');
    const marks = status === 'correct' ? 1 : status === 'incorrect' ? -attempt.negativeMarking : 0;
    const marksLabel = marks > 0 ? `+${formatScore(marks)}` : formatScore(marks);
    const timeSpent = attempt.questionTime ? attempt.questionTime[i] : undefined;
    const timeLabel = timeSpent !== undefined ? formatTime(timeSpent) : '—';

    let optionsHtml = '';
    if (q.options && q.options.length){
      optionsHtml = `<div class="mt-6">` + q.options.map(opt => {
        let cls = 'locked';
        if (opt === q.answer) cls += ' correct';
        else if (opt === given && opt !== q.answer) cls += ' incorrect';
        return `<div class="option ${cls}" style="margin-bottom:6px;padding:10px;">
          <div class="bubble" style="width:26px;height:26px;min-width:26px;font-size:12px;">${escapeHtml(opt.charAt(0))}</div>
          <div class="option-text" style="font-size:14px;">${escapeHtml(opt)}</div>
        </div>`;
      }).join('') + `</div>`;
    }

    return `
      <div class="card">
        <span class="pill ${pillClass}">${pillLabel}</span>
        ${isFlagged ? '<span class="pill" style="background:#F6E7C6;color:#8A6A0E;margin-left:6px;">🚩 Flagged</span>' : ''}
        <span class="marks-label">${marksLabel}</span>
        <div class="question-text" style="font-size:15.5px;margin:10px 0 4px;">${i+1}. ${escapeHtml(q.question)}</div>
        ${optionsHtml}
        ${(!q.options || !q.options.length) ? `
          <div class="review-answer">${t('your_answer')} <b>${escapeHtml(given) || t('no_answer')}</b></div>
          ${!correct ? `<div class="review-answer">${t('correct_answer_review')} <b>${escapeHtml(q.answer)}</b></div>` : ''}
        ` : ''}
        ${q.explanation ? `<div class="explanation-box">${escapeHtml(q.explanation).replace(/\n/g,'<br>')}</div>` : ''}
        <div class="review-answer">${t('time_spent')} <b>${timeLabel}</b></div>
      </div>
    `;
  }).join('') || `<p class="hint center-text mt-24">${t('no_category')}</p>`;

  app.innerHTML = `
    <div class="content">
      ${gearButtonHTML()}
      <div class="eyebrow center-text">${opts.fromHistory ? t('result_review') : t('quiz_complete')}</div>
      <div class="eyebrow center-text" style="font-weight:400;text-transform:none;letter-spacing:0;">${escapeHtml(attempt.title)}</div>
      <div class="score-badge center-text">${formatScore(rawScore)} / ${total}</div>
      <div class="center-text mt-6"><span class="pill ${passed ? 'pill-pass' : 'pill-fail'}">${passed ? t('pass') : t('fail')}</span></div>
      <p class="center-text hint" style="font-size:14px;">${t('result_meta', { pct: pct, negmark: negMarkLabel, total: formatTime(attempt.totalTime), avg: formatTime(avgTime) })}</p>
      <p class="score-breakdown">${t('result_breakdown', { correct: correctCount, incorrect: incorrectCount, skipped: skippedCount, passmark: attempt.passingPercent ?? 40 })}</p>
      <p class="hint center-text" style="margin-top:2px;">${new Date(attempt.date).toLocaleString(state.language==='hi' ? 'hi-IN' : 'en-US')}</p>

      <div class="tabs mt-24 no-print">${tabsHtml}</div>
      <div class="mt-24" id="result-rows">${rows}</div>

      <div class="home-buttons mt-24 no-print">
        ${!opts.fromHistory ? `<button class="btn btn-primary" data-action="retake-quiz">${t('retake_quiz')}</button>` : `<button class="btn btn-primary" data-action="retake-attempt">${t('retake_this_quiz')}</button>`}
        <button class="btn btn-outline" data-action="print-result">${t('print_pdf')}</button>
        <button class="btn btn-outline" data-action="export-result-json">${t('export_result')}</button>
        <button class="btn btn-text" data-action="show-history">${t('view_all_results')}</button>
        <button class="btn btn-text" data-action="go-home">${t('home')}</button>
      </div>
    </div>
  `;
  window.__currentResultAttempt = attempt;
  window.__currentResultFromHistory = !!opts.fromHistory;
  rerender = () => renderResultView(attempt, filter, opts);
}

/* ---------------- Utilities ---------------- */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }
function closeModal(){
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
}
function downloadJSON(filename, data){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------------- Event delegation ---------------- */
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.getAttribute('data-action');

  switch(action){
    case 'load-file':
      fileInput.click();
      break;
    case 'show-builder':
      state.builderQuestions = [];
      state.builderTitle = 'Untitled Quiz';
      renderBuilder();
      break;
    case 'show-help':
      renderHelp();
      break;
    case 'close-modal':
      closeModal();
      break;
    case 'submit-registration':
      handleRegistrationSubmit();
      break;
    case 'go-home':
      renderHome();
      break;
    case 'open-settings':
      renderSettingsModal();
      break;
    case 'close-settings': {
      readSettingsFromDOM();
      closeModal();
      if (rerender) rerender();
      break;
    }
    case 'set-language': {
      const lang = el.getAttribute('data-lang');
      if (lang !== state.language){
        readSettingsFromDOM();
        state.language = lang;
        saveSettings();
        closeModal();
        if (rerender) rerender();
        renderSettingsModal();
      }
      break;
    }
    case 'quick-set-language': {
      const lang = el.getAttribute('data-lang');
      if (lang === state.language) break;
      const oldQuestions = state.questions;
      state.language = lang;
      saveSettings();
      if (state.questionMeta && state.questionMeta.length && oldQuestions && oldQuestions.length === state.questionMeta.length){
        // Quiz in progress: recompute text only, same question order & same option order.
        const newQuestions = state.questionMeta.map(m => localizeQuestionOrdered(m.src, lang, m.optionOrder));
        // Carry forward any already-selected MCQ answers by translating them via option position.
        Object.keys(state.answers).forEach(key => {
          const i = Number(key);
          const oldQ = oldQuestions[i];
          const newQ = newQuestions[i];
          if (!oldQ || !newQ) return;
          const given = state.answers[i];
          if (!given) return;
          if (oldQ.options && oldQ.options.length){
            const k = oldQ.options.indexOf(given);
            if (k !== -1) state.answers[i] = newQ.options[k];
          }
          // short-answer (typed) responses are left as typed — usually numeric/unchanged.
        });
        state.questions = newQuestions;
      }
      if (rerender) rerender();
      break;
    }
    case 'open-add-question':
      renderAddQuestionModal();
      break;
    case 'set-type': {
      modalType = el.getAttribute('data-type');
      document.querySelectorAll('[data-type-pill]').forEach(p => {
        p.classList.toggle('active', p.getAttribute('data-type-pill') === modalType);
      });
      document.getElementById('options-block').style.display = modalType === 'mcq' ? 'block' : 'none';
      break;
    }
    case 'save-question': {
      const questionText = document.getElementById('q-text').value.trim();
      const answer = document.getElementById('q-answer').value.trim();
      const explanation = document.getElementById('q-explanation').value.trim();
      if (!questionText || !answer){ alert(t('alert_fill_question')); return; }
      let options = [];
      if (modalType === 'mcq'){
        options = Array.from(document.querySelectorAll('.opt-input')).map(i => i.value.trim()).filter(Boolean);
        if (options.length < 2){ alert(t('alert_min_options')); return; }
        if (!options.includes(answer)){ alert(t('alert_answer_match')); return; }
      }
      state.builderQuestions.push({ question: questionText, options, answer, explanation });
      closeModal();
      renderBuilder();
      break;
    }
    case 'remove-question': {
      const idx = parseInt(el.getAttribute('data-index'), 10);
      state.builderQuestions.splice(idx, 1);
      renderBuilder();
      break;
    }
    case 'export-quiz': {
      if (!state.builderQuestions.length){ alert(t('alert_add_question_first')); return; }
      const title = document.getElementById('builder-title').value.trim() || 'Untitled Quiz';
      downloadJSON(title.replace(/\s+/g,'_') + '.json', { title, questions: state.builderQuestions });
      break;
    }
    case 'finish-builder': {
      if (!state.builderQuestions.length){ alert(t('alert_add_question_first')); return; }
      state.title = document.getElementById('builder-title').value.trim() || 'Untitled Quiz';
      state.sourceQuestions = state.builderQuestions.slice();
      requireRegistrationThen(startQuiz);
      break;
    }
    case 'select-option': {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      break;
    }
    case 'check-answer': {
      captureAnswer();
      state.checked[state.index] = true;
      finalizeQuestionTime(state.index);
      const q = state.questions[state.index];
      const given = state.answers[state.index] || '';
      const isCorrect = given.trim().toLowerCase() === q.answer.trim().toLowerCase();
      playSound(isCorrect ? 'correct' : 'wrong');
      renderQuestion();
      break;
    }
    case 'next-question': {
      if (!state.checked[state.index] && !state.timedOut[state.index]) captureAnswer();
      finalizeQuestionTime(state.index);
      if (state.index === state.questions.length - 1){
        renderResults();
      } else {
        state.index++;
        renderQuestion();
      }
      break;
    }
    case 'prev-question': {
      if (!state.checked[state.index] && !state.timedOut[state.index]) captureAnswer();
      finalizeQuestionTime(state.index);
      state.index--;
      renderQuestion();
      break;
    }
    case 'start-daily-quiz': {
      if (!dailyQuiz){ alert(t('todays_quiz_error')); return; }
      state.title = dailyQuiz.title || 'Quiz';
      state.sourceQuestions = dailyQuiz.questions;
      requireRegistrationThen(startQuiz);
      break;
    }
    case 'start-listed-quiz': {
      const file = el.getAttribute('data-file');
      const fallbackTitle = el.getAttribute('data-title') || file;
      fetch('./' + file + '?t=' + Date.now())
        .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.text(); })
        .then(text => {
          let data;
          try { data = JSON.parse(text); }
          catch(e){ throw new Error('Invalid JSON in ' + file); }
          if (!data || !Array.isArray(data.questions) || !data.questions.length){
            throw new Error('No questions found in ' + file);
          }
          state.title = data.title || fallbackTitle;
          state.sourceQuestions = data.questions;
          requireRegistrationThen(startQuiz);
        })
        .catch(err => alert(t('quiz_load_error', { msg: err.message })));
      break;
    }
    case 'retake-quiz':
      startQuiz();
      break;
    case 'submit-quiz': {
      if (!state.checked[state.index] && !state.timedOut[state.index]) captureAnswer();
      finalizeQuestionTime(state.index);
      const unanswered = countUnanswered();
      if (unanswered > 0){
        const proceed = confirm(t('confirm_unanswered', { n: unanswered, s: unanswered > 1 ? 's' : '' }));
        if (!proceed) return;
      }
      renderResults();
      break;
    }
    case 'toggle-advanced': {
      const panel = document.getElementById('advanced-panel');
      if (panel){
        const open = panel.classList.toggle('open');
        el.textContent = open ? t('advanced_settings_open') : t('advanced_settings_closed');
      }
      break;
    }
    case 'toggle-flag': {
      state.flagged[state.index] = !state.flagged[state.index];
      renderQuestion();
      break;
    }
    case 'open-navigator':
      renderNavigatorModal();
      break;
    case 'jump-to-question': {
      const idx = parseInt(el.getAttribute('data-index'), 10);
      closeModal();
      if (Number.isNaN(idx) || idx === state.index) break;
      if (!state.checked[state.index] && !state.timedOut[state.index]) captureAnswer();
      finalizeQuestionTime(state.index);
      state.index = idx;
      renderQuestion();
      break;
    }
    case 'show-history':
      renderHistoryList();
      break;
    case 'view-attempt': {
      const id = el.getAttribute('data-id');
      const attempt = getHistory().find(a => a.id === id);
      if (attempt) renderResultView(attempt, 'all', { fromHistory:true });
      break;
    }
    case 'delete-attempt': {
      const id = el.getAttribute('data-id');
      if (confirm(t('confirm_delete_attempt'))){
        deleteAttempt(id);
        renderHistoryList();
      }
      break;
    }
    case 'clear-history': {
      if (confirm(t('confirm_clear_history'))){
        clearAllHistory();
        renderHistoryList();
      }
      break;
    }
    case 'filter-results': {
      const filter = el.getAttribute('data-filter');
      const attempt = window.__currentResultAttempt;
      if (attempt) renderResultView(attempt, filter, { fromHistory: !!window.__currentResultFromHistory });
      break;
    }
    case 'retake-attempt': {
      const attempt = window.__currentResultAttempt;
      if (!attempt) return;
      state.title = attempt.title;
      state.sourceQuestions = attempt.questions.map(q => ({ question:q.question, options:(q.options||[]).slice(), answer:q.answer, explanation:q.explanation||'' }));
      startQuiz();
      break;
    }
    case 'print-result':
      window.print();
      break;
    case 'export-result-json': {
      const attempt = window.__currentResultAttempt;
      if (!attempt) return;
      downloadJSON((attempt.title || 'result').replace(/\s+/g,'_') + '_result.json', attempt);
      break;
    }
  }
});

document.addEventListener('change', (e) => {
  if (e.target && e.target.id === 'timer-toggle'){
    const row = document.getElementById('timer-input-row');
    if (row) row.style.display = e.target.checked ? '' : 'none';
  }
  if (e.target && e.target.id === 'overall-timer-toggle'){
    const row = document.getElementById('overall-timer-input-row');
    if (row) row.style.display = e.target.checked ? '' : 'none';
  }
  if (e.target && e.target.id === 'dark-mode-toggle'){
    state.darkMode = e.target.checked;
    applyTheme();
    saveSettings();
  }
});

let dailyQuiz = null;
let dailyQuizFailed = false;
let dailyQuizError = null;
function loadDailyQuiz(){
  fetch('./questions.json?t=' + Date.now())
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status + ' — file not found at this path');
      return res.text();
    })
    .then(text => {
      let data;
      try { data = JSON.parse(text); }
      catch(e){ throw new Error('File found but is not valid JSON (' + e.message + ')'); }
      if (!data || !Array.isArray(data.questions) || !data.questions.length){
        throw new Error('File loaded but has no "questions" array with items');
      }
      dailyQuiz = data;
      dailyQuizError = null;
      if (rerender === renderHome) renderHome();
    })
    .catch(err => {
      dailyQuizFailed = true;
      dailyQuizError = err.message;
      if (rerender === renderHome) renderHome();
    });
}

/* Multi-quiz mode: looks for a "quizzes.json" manifest listing several
   question files, e.g. [{"title":"GK Set 1","file":"gk1.json"}, ...].
   If found, the home screen shows one button per quiz. If not found,
   falls back to the older single "questions.json" auto-load behavior. */
let quizList = null;
function loadQuizManifest(){
  fetch('./quizzes.json?t=' + Date.now())
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(text => {
      let data;
      try { data = JSON.parse(text); }
      catch(e){ throw new Error('quizzes.json is not valid JSON'); }
      if (!Array.isArray(data) || !data.length || !data.every(d => d && d.file)){
        throw new Error('quizzes.json must be an array of {"title":..., "file":...}');
      }
      quizList = data;
      if (rerender === renderHome) renderHome();
    })
    .catch(() => {
      // No manifest published — fall back to legacy single-file auto-load.
      loadDailyQuiz();
    });
}

loadSettings();
loadAttendee();
applyTheme();
renderHome();
loadQuizManifest();
</script>
